        // ================================================================
        //  股票搜索联想
        // ================================================================
        let searchTimeout = null;
        let activeSearchScript = null;

        function searchStock(keyword, callback) {
            if (!keyword || keyword.length < 1) { callback([]); return; }
            if (activeSearchScript) {
                document.head.removeChild(activeSearchScript);
                activeSearchScript = null;
            }
            window.suggestdata = null;
            const script = document.createElement('script');
            const url =
                `https://suggest3.sinajs.cn/suggest/type=stock,usstock,hkstock&key=${encodeURIComponent(keyword)}&name=1`;
            script.src = url;
            script.onload = function () {
                const data = window.suggestdata;
                if (data && Array.isArray(data)) {
                    const results = data.map(item => ({ code: item[0], name: item[1] }));
                    callback(results);
                } else {
                    callback([]);
                }
                window.suggestdata = null;
                document.head.removeChild(script);
                activeSearchScript = null;
            };
            script.onerror = function () {
                callback([]);
                document.head.removeChild(script);
                activeSearchScript = null;
            };
            document.head.appendChild(script);
            activeSearchScript = script;
        }

        // ================================================================

        function addDanmaku(seriesName, text) {
            const s = getSeries(seriesName);
            if (!s) return;
            if (!s.danmaku) s.danmaku = [];
            text = text.trim();
            if (text && !s.danmaku.includes(text)) {
                s.danmaku.push(text);
                renderSeriesManager();
                resetDanmaku();
                saveState();
            }
        }

        function removeDanmaku(seriesName, index) {
            const s = getSeries(seriesName);
            if (!s || !s.danmaku) return;
            s.danmaku.splice(index, 1);
            renderSeriesManager();
            resetDanmaku();
            saveState();
        }

        // ================================================================
        //  渲染系列管理
        // ================================================================

        function renderSeriesManager() {
            // 计算每个指标的获第一天数（登顶天数）
            const firstPlaceDays = {};
            seriesKeys.forEach(key => { firstPlaceDays[key] = 0; });
            for (let i = 0; i < dates.length; i++) {
                const changes = [];
                seriesKeys.forEach(key => {
                    const s = getSeries(key);
                    if (!s) return;
                    const base = s.data[0];
                    const curr = s.data[i];
                    const change = calcTotalChange(base, curr);
                    changes.push({ key, change });
                });
                const sorted = changes.sort((a, b) => b.change - a.change);
                if (sorted.length > 0) {
                    const firstKey = sorted[0].key;
                    firstPlaceDays[firstKey] = (firstPlaceDays[firstKey] || 0) + 1;
                }
            }


            let html = '';
            seriesList.forEach((s, idx) => {
                const code = s.code || '';
                const market = getMarketType(code);
                let btnClass = 'market-btn';
                let btnText = '';
                let btnDisabled = 'disabled';
                let link = '#';
                if (code) {
                    link = getXueqiuLink(code);
                    if (link !== '#') { btnDisabled = ''; }
                    if (market === 'a') {
                        btnClass += ' market-a';
                        btnText = 'A';
                    } else if (market === 'hk') {
                        btnClass += ' market-hk';
                        btnText = 'H';
                    } else if (market === 'us') {
                        btnClass += ' market-us';
                        btnText = 'U';
                    } else {
                        btnText = '?';
                        btnClass += ' market-unknown';
                    }
                } else {
                    btnText = '?';
                    btnClass += ' market-unknown';
                }
                let danmakuTags = '';
                if (s.danmaku && s.danmaku.length > 0) {
                    s.danmaku.forEach((dm, i) => {
                        danmakuTags +=
                            `<span class="danmaku-tag">${dm} <span class="danmaku-del" data-series="${s.name}" data-index="${i}">✕</span></span>`;
                    });
                }

                // ★★★ 计算跑赢上证（最新日期总变化率差值百分比） ★★★
                const shSeries = getSeries('上证');
                let diffToSH = '--';
                let diffColor = 'var(--text-muted)';
                if (shSeries && dates.length > 0) {
                    const latestIdx = dates.length - 1;
                    const baseSH = shSeries.data[0];
                    const currSH = shSeries.data[latestIdx];
                    const changeSH = calcTotalChange(baseSH, currSH);
                    const baseS = s.data[0];
                    const currS = s.data[latestIdx];
                    const changeS = calcTotalChange(baseS, currS);
                    const diffValue = changeS - changeSH;
                    diffToSH = (diffValue >= 0 ? '+' : '') + diffValue.toFixed(2) + '%';
                    // 差值 >= 0 为红色，< 0 为绿色
                    diffColor = diffValue >= 0 ? '#ef4444' : '#22c55e';
                }
                html += `
                        <div class="series-item" data-series="${s.name}" data-index="${idx}">
                            
                            <div class="row-main">
                                <span class="drag-handle">⠿</span>
                                <div class="avatar-sm"><img src="${s.avatarUrl}" alt="${s.name}" /></div>
                                <input class="series-name-input" type="text" value="${s.name}" data-oldname="${s.name}" />
                                <input class="color-picker" type="color" value="${s.color}" />
                                <span style="font-weight:700; font-size:12px; color:#000000; min-width:70px; display:inline-block; text-align:center; background:transparent; border:none; letter-spacing:0.3px;" data-series="${s.name}">
                                    🏆登顶${firstPlaceDays[s.name] || 0}天 跑赢上证<span style="color:${diffColor};">${diffToSH}</span>
                                    </span><span class="code-wrapper">
                                    <input class="code-input" type="text" placeholder="股票代码/名称" value="${s.code || ''}" data-series="${s.name}" autocomplete="off" />
                                    <div class="code-dropdown" data-series="${s.name}"></div>
                                    <button class="${btnClass}" ${btnDisabled} data-link="${link}" title="查看雪球行情">${btnText}</button>
                                </span>
                                <span class="upload-btn"><button class="btn-icon">📤</button><input type="file" accept="image/*" data-series="${s.name}" /></span>
                                <button class="btn-icon" style="background:transparent;" data-reset-avatar="${s.name}">↩️</button>
                            </div>
                            <div class="danmaku-section">
                                <div class="danmaku-row">
                                    <input class="danmaku-input" placeholder="输入弹幕文字" data-series="${s.name}" />
                                    <button class="danmaku-add-btn" data-series="${s.name}">添加</button>
                                </div>
                                <div class="danmaku-list">${danmakuTags}</div>
                            </div>
                        </div>
                    `;
            });
            seriesManager.innerHTML = html;
            // ★★★ 指标行点击选中/取消选中 ★★★
            seriesManager.querySelectorAll('.series-item').forEach(item => {
                item.addEventListener('click', function (e) {
                    // 如果点击的是内部操作按钮，不触发选中
                    if (e.target.closest('.upload-btn') ||
                        e.target.closest('.danmaku-add-btn') ||
                        e.target.closest('.danmaku-del') ||
                        e.target.closest('.market-btn') ||
                        e.target.closest('[data-reset-avatar]')) {
                        return;
                    }
                    // 切换选中状态
                    this.classList.toggle('selected');
                });
            });

            // ★★★ 删除选中指标 ★★★

            seriesManager.querySelectorAll('.danmaku-add-btn').forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const seriesName = this.dataset.series;
                    const input = this.parentElement.querySelector('.danmaku-input');
                    const text = input.value.trim();
                    if (text) {
                        addDanmaku(seriesName, text);
                        input.value = '';
                    }
                });
            });
            seriesManager.querySelectorAll('.danmaku-del').forEach(el => {
                el.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const seriesName = this.dataset.series;
                    const index = parseInt(this.dataset.index);
                    removeDanmaku(seriesName, index);
                });
            });
            seriesManager.querySelectorAll('.danmaku-input').forEach(inp => {
                inp.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const seriesName = this.dataset.series;
                        const text = this.value.trim();
                        if (text) {
                            addDanmaku(seriesName, text);
                            this.value = '';
                        }
                    }
                });
            });

            bindSeriesManagerEvents();
        }

        function bindSeriesManagerEvents() {

            seriesManager.querySelectorAll('.market-btn').forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const url = this.dataset.link;
                    if (url && url !== '#') { window.open(url, '_blank'); }
                });
            });
            if (window.Sortable) {
                new Sortable(seriesManager, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function () {
                        const items = seriesManager.querySelectorAll('.series-item');
                        const newOrder = [];
                        items.forEach(item => {
                            const name = item.querySelector('.series-name-input').value;
                            newOrder.push(name);
                        });
                        const newSeriesList = [];
                        newOrder.forEach(name => {
                            const s = getSeries(name);
                            if (s) newSeriesList.push(s);
                        });
                        if (newSeriesList.length === seriesList.length) {
                            seriesList = newSeriesList;
                            seriesKeys = seriesList.map(s => s.name);
                            renderTables();
                            renderChart();
                            resetDanmaku();
                            updateWaterfallSelect();
                            saveState();
                        }
                    }
                });
            }
            seriesManager.querySelectorAll('.series-name-input').forEach(inp => {
                inp.addEventListener('blur', function () {
                    const oldName = this.dataset.oldname;
                    const newName = this.value.trim();
                    if (!newName || newName === oldName) { this.value = oldName; return; }
                    if (seriesKeys.includes(newName) && newName !== oldName) {
                        alert('指标名称已存在');
                        this.value = oldName;
                        return;
                    }
                    const s = getSeries(oldName);
                    if (s) {
                        s.name = newName;
                        const idx = seriesKeys.indexOf(oldName);
                        if (idx !== -1) seriesKeys[idx] = newName;
                        this.dataset.oldname = newName;
                        const parent = this.closest('.series-item');
                        parent.querySelector('.remark-input').dataset.series = newName;
                        parent.querySelector('.code-input').dataset.series = newName;
                        parent.querySelector('.danmaku-input').dataset.series = newName;
                        parent.querySelector('.danmaku-add-btn').dataset.series = newName;
                        parent.querySelectorAll('.danmaku-del').forEach(el => el.dataset.series = newName);
                        parent.querySelector('.upload-btn input[type="file"]').dataset.series = newName;
                        parent.querySelector('[data-reset-avatar]').dataset.resetAvatar = newName;
                        parent.querySelector('.waterfall-view-btn').dataset.series = newName;
                        parent.dataset.series = newName;
                        if (waterfallSeriesName === oldName) waterfallSeriesName = newName;
                        renderTables();
                        renderChart();
                        resetDanmaku();
                        updateWaterfallSelect();
                        saveState();
                    }
                });
                inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') this.blur(); });
            });
            seriesManager.querySelectorAll('.color-picker').forEach(picker => {
                picker.addEventListener('input', function () {
                    const parent = this.closest('.series-item');
                    const nameInput = parent.querySelector('.series-name-input');
                    const name = nameInput.value;
                    const s = getSeries(name);
                    if (s) {
                        s.color = this.value;
                        renderTables();
                        renderChart();
                        saveState();
                    }
                });
            });

            seriesManager.querySelectorAll('.code-wrapper').forEach(wrapper => {
                const input = wrapper.querySelector('.code-input');
                const dropdown = wrapper.querySelector('.code-dropdown');
                const seriesName = input.dataset.series;
                input.addEventListener('input', function (e) {
                    const keyword = this.value.trim();
                    const s = getSeries(seriesName);
                    if (s) {
                        s.code = keyword;
                        saveState();
                        updateMarketButton(this);
                    }
                    if (searchTimeout) clearTimeout(searchTimeout);
                    if (keyword.length < 1) { dropdown.classList.remove('show'); return; }
                    searchTimeout = setTimeout(() => {
                        searchStock(keyword, (results) => {
                            renderDropdown(results, dropdown, input,
                                seriesName);
                        });
                    }, 200);
                });
                document.addEventListener('click', function (e) {
                    if (!wrapper.contains(e.target)) { dropdown.classList.remove('show'); }
                });
                let selectedIndex = -1;
                input.addEventListener('keydown', function (e) {
                    const items = dropdown.querySelectorAll('.code-dropdown-item');
                    if (items.length === 0) return;
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                        highlightItem(items, selectedIndex);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        selectedIndex = Math.max(selectedIndex - 1, -1);
                        highlightItem(items, selectedIndex);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (selectedIndex >= 0 && selectedIndex < items.length) {
                            items[selectedIndex].click();
                        }
                    } else if (e.key === 'Escape') {
                        dropdown.classList.remove('show');
                        selectedIndex = -1;
                    }
                });

                function highlightItem(items, idx) {
                    items.forEach((item, i) => { item.style.background = i === idx ? 'var(--dropdown-hover)' : ''; });
                }

                function updateMarketButton(inp) {
                    const wrapper2 = inp.closest('.code-wrapper');
                    const btn = wrapper2.querySelector('.market-btn');
                    const code = inp.value.trim();
                    const market = getMarketType(code);
                    const link = getXueqiuLink(code);
                    btn.dataset.link = link;
                    if (link === '#') {
                        btn.disabled = true;
                        btn.style.opacity = '0.4';
                    } else {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }
                    btn.className = 'market-btn';
                    if (market === 'a') {
                        btn.classList.add('market-a');
                        btn.textContent = 'A';
                    } else if (market === 'hk') {
                        btn.classList.add('market-hk');
                        btn.textContent = 'H';
                    } else if (market === 'us') {
                        btn.classList.add('market-us');
                        btn.textContent = 'U';
                    } else {
                        btn.textContent = '?';
                        btn.classList.add('market-unknown');
                    }
                    btn.title = link !== '#' ? '查看雪球行情' : '无代码';
                }
            });
            seriesManager.querySelectorAll('.upload-btn input[type="file"]').forEach(input => {
                input.addEventListener('change', function (e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const key = this.dataset.series;
                    const reader = new FileReader();
                    reader.onload = function (ev) {
                        const dataUrl = ev.target.result;
                        compressImage(dataUrl, 200, function (compressedUrl) {
                            processAvatarUrl(compressedUrl, (circularUrl) => {
                                const s = getSeries(key);
                                if (s) {
                                    s.avatarUrl = circularUrl;
                                    renderSeriesManager();
                                    renderChart();
                                    resetDanmaku();
                                    saveState();
                                }
                            });
                        });
                    };
                    reader.readAsDataURL(file);
                    this.value = '';
                });
            });
            seriesManager.querySelectorAll('[data-reset-avatar]').forEach(btn => {
                btn.addEventListener('click', function () {
                    const key = this.dataset.resetAvatar;
                    processAvatarUrl(DEFAULT_AVATAR_SVG, (circularUrl) => {
                        const s = getSeries(key);
                        if (s) {
                            s.avatarUrl = circularUrl;
                            renderSeriesManager();
                            renderChart();
                            resetDanmaku();
                            saveState();
                        }
                    });
                });
            });
        }

        function renderDropdown(results, dropdown, input, seriesName) {
            dropdown.innerHTML = '';
            if (!results || results.length === 0) { dropdown.classList.remove('show'); return; }
            const maxShow = 10;
            const items = results.slice(0, maxShow);
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'code-dropdown-item';
                div.innerHTML =
                    `<span class="stock-code">${item.code}</span><span class="stock-name">${item.name}</span>`;
                div.addEventListener('mousedown', function (e) { e.preventDefault(); });
                div.addEventListener('click', function () {
                    input.value = item.code;
                    const s = getSeries(seriesName);
                    if (s) {
                        s.code = item.code;
                        saveState();
                        const evt = new Event('input');
                        input.dispatchEvent(evt);
                    }
                    dropdown.classList.remove('show');
                });
                dropdown.appendChild(div);
            });
            dropdown.classList.add('show');
        }

        // ================================================================
        //  多选状态管理
        // ================================================================
        let selectedRows = new Set();
        let selectedCols = new Set();
        let lastClickedRow = null;
        let lastClickedCol = null;

        function clearSelection() {
            selectedRows.clear();
            selectedCols.clear();
            lastClickedRow = null;
            lastClickedCol = null;
            updateSelectionUI();
        }

        function updateSelectionUI() {
            document.querySelectorAll('#rawBody tr, #dailyBody tr, #totalBody tr').forEach(tr => {
                const idx = parseInt(tr.dataset.row);
                if (selectedRows.has(idx)) tr.classList.add('selected-row');
                else tr.classList.remove('selected-row');
            });
            document.querySelectorAll('#rawHead th, #dailyHead th, #totalHead th').forEach(th => {
                const col = th.dataset.col;
                if (col && selectedCols.has(col)) th.classList.add('selected-col');
                else th.classList.remove('selected-col');
            });
        }

        // ================================================================
        //  更新关联单元格
        // ================================================================
        function updateLinkedCells(row, key) {
            const dailyInputs = dailyBody.querySelectorAll(`input[data-row="${row}"][data-series="${key}"]`);
            dailyInputs.forEach(inp => {
                const s = getSeries(key);
                if (!s) return;
                let dailyChange = 0;
                if (row === 0) dailyChange = 0;
                else {
                    const prev = s.data[row - 1];
                    const curr = s.data[row];
                    dailyChange = calcDailyChange(prev, curr);
                }
                inp.value = formatDisplay(dailyChange);
            });
            const totalInputs = totalBody.querySelectorAll(`input[data-row="${row}"][data-series="${key}"]`);
            totalInputs.forEach(inp => {
                const s = getSeries(key);
                if (!s) return;
                const base = s.data[0];
                const curr = s.data[row];
                const totalChange = calcTotalChange(base, curr);
                inp.value = formatDisplay(totalChange);
            });
            const rawInputs = rawBody.querySelectorAll(`input[data-row="${row}"][data-series="${key}"]`);
            rawInputs.forEach(inp => {
                const s = getSeries(key);
                if (s) { inp.value = formatDisplay(s.data[row]); }
            });
        }

        // ================================================================
        //  渲染表格
        // ================================================================
        // ================================================================
        //  渲染表格（行=指标，列=日期）
        // ================================================================
        function renderTables() {
            // ---- 表头生成 ----
            function renderHead(dateCols) {
                let html = `<tr><th style="text-align:left; padding-left:8px;">📊 指标</th>`;
                dateCols.forEach(dateStr => {
                    html += `<th data-col="${dateStr}" style="cursor:pointer;">
                    <span class="date-editor" contenteditable="false">${dateStr}</span>
                </th>`;
                });
                html += `</tr>`;
                return html;
            }

            // 三个表的表头相同
            const headHtml = renderHead(dates);
            rawHead.innerHTML = headHtml;
            dailyHead.innerHTML = headHtml;
            totalHead.innerHTML = headHtml;

            // ---- 表体生成 ----
            function renderBody(type) {
                let html = '';
                seriesKeys.forEach((key, idx) => {
                    const s = getSeries(key);
                    if (!s) return;
                    const color = s.color || '#3b82f6';
                    html += `<tr data-row="${key}" data-index="${idx}">`;
                    html += `<td class="row-label" style="text-align:left; padding-left:8px; font-weight:600;">
                                <span class="color-dot" style="background:${color};"></span> ${key}
                            </td>`;
                    dates.forEach((date, i) => {
                        let value;
                        let disabled = '';
                        let inputClass = '';
                        if (type === 'raw') {
                            value = s.data[i];
                            inputClass = 'raw-input';
                        } else if (type === 'daily') {
                            if (i === 0) {
                                value = 0;
                                disabled = 'disabled';
                            } else {
                                const prev = s.data[i - 1];
                                const curr = s.data[i];
                                value = calcDailyChange(prev, curr);
                            }
                            inputClass = 'daily-input';
                            if (i === 0) disabled = 'disabled';
                        } else if (type === 'total') {
                            const base = s.data[0];
                            value = calcTotalChange(base, s.data[i]);
                            inputClass = 'total-input';
                            if (i === 0) disabled = 'disabled';
                        }
                        html += `<td><input type="number" step="0.0000000001" value="${formatDisplay(value)}" 
                                    data-row="${key}" data-col="${date}" data-type="${type}" 
                                    class="${inputClass}" ${disabled} /></td>`;
                    });
                    html += `</tr>`;
                });
                return html;
            }

            rawBody.innerHTML = renderBody('raw');
            dailyBody.innerHTML = renderBody('daily');
            totalBody.innerHTML = renderBody('total');

            // ---- 事件绑定 ----
            // 原始值输入框编辑
            rawBody.querySelectorAll('.raw-input').forEach(input => {
                input.addEventListener('input', function () {
                    const seriesName = this.dataset.row;
                    const date = this.dataset.col;
                    const s = getSeries(seriesName);
                    if (!s) return;
                    const idx = dates.indexOf(date);
                    if (idx === -1) return;
                    let val = parseFloat(this.value);
                    if (isNaN(val)) val = 0;
                    s.data[idx] = val;
                    // 更新其他表对应单元格
                    updateLinkedCells(seriesName, date);
                    renderChart();
                    saveState();
                });
                input.addEventListener('blur', function () {
                    let val = parseFloat(this.value);
                    if (isNaN(val)) val = 0;
                    this.value = formatDisplay(val);
                    const seriesName = this.dataset.row;
                    const date = this.dataset.col;
                    const s = getSeries(seriesName);
                    if (!s) return;
                    const idx = dates.indexOf(date);
                    if (idx === -1) return;
                    s.data[idx] = val;
                    updateLinkedCells(seriesName, date);
                    renderChart();
                    saveState();
                });
            });

            // ---- 行/列选择（点击单元格） ----
            const allBodies = [rawBody, dailyBody, totalBody];
            allBodies.forEach(body => {
                body.querySelectorAll('tr').forEach(tr => {
                    tr.addEventListener('click', function (e) {
                        if (e.target.tagName === 'INPUT') return;
                        const seriesName = this.dataset.row;
                        if (!seriesName) return;
                        if (e.ctrlKey || e.metaKey) {
                            if (selectedRows.has(seriesName)) selectedRows.delete(seriesName);
                            else selectedRows.add(seriesName);
                            lastClickedRow = seriesName;
                        } else if (e.shiftKey && lastClickedRow !== null) {
                            const idx1 = seriesKeys.indexOf(lastClickedRow);
                            const idx2 = seriesKeys.indexOf(seriesName);
                            if (idx1 !== -1 && idx2 !== -1) {
                                const start = Math.min(idx1, idx2);
                                const end = Math.max(idx1, idx2);
                                for (let i = start; i <= end; i++) {
                                    selectedRows.add(seriesKeys[i]);
                                }
                            }
                            lastClickedRow = seriesName;
                        } else {
                            selectedRows.clear();
                            selectedRows.add(seriesName);
                            lastClickedRow = seriesName;
                        }
                        selectedCols.clear();
                        updateSelectionUI();
                    });
                });
            });

            // 表头点击（列选择）
            const allHeads = [rawHead, dailyHead, totalHead];
            allHeads.forEach(head => {
                head.querySelectorAll('th[data-col]').forEach(th => {
                    th.addEventListener('click', function (e) {
                        const date = this.dataset.col;
                        if (!date) return;
                        if (e.ctrlKey || e.metaKey) {
                            if (selectedCols.has(date)) selectedCols.delete(date);
                            else selectedCols.add(date);
                            lastClickedCol = date;
                        } else if (e.shiftKey && lastClickedCol !== null) {
                            const idx1 = dates.indexOf(lastClickedCol);
                            const idx2 = dates.indexOf(date);
                            if (idx1 !== -1 && idx2 !== -1) {
                                const start = Math.min(idx1, idx2);
                                const end = Math.max(idx1, idx2);
                                for (let i = start; i <= end; i++) {
                                    selectedCols.add(dates[i]);
                                }
                            }
                            lastClickedCol = date;
                        } else {
                            selectedCols.clear();
                            selectedCols.add(date);
                            lastClickedCol = date;
                        }
                        selectedRows.clear();
                        updateSelectionUI();
                    });
                });
            });

            // 双击清空选择
            allBodies.forEach(body => {
                body.addEventListener('dblclick', function () {
                    selectedRows.clear();
                    lastClickedRow = null;
                    updateSelectionUI();
                });
            });
            allHeads.forEach(head => {
                head.addEventListener('dblclick', function () {
                    selectedCols.clear();
                    lastClickedCol = null;
                    updateSelectionUI();
                });
            });

            updateSelectionUI();
            // 滚动到底部
            if (rawScroll) rawScroll.scrollTop = rawScroll.scrollHeight;
            if (dailyScroll) dailyScroll.scrollTop = dailyScroll.scrollHeight;
            if (totalScroll) totalScroll.scrollTop = totalScroll.scrollHeight;

            // ★★★ 渲染新增的两个表 ★★★
            renderRankTable();
            renderStatsTable();
            // 日期列头双击编辑
            document.querySelectorAll('#rawHead .date-editor, #dailyHead .date-editor, #totalHead .date-editor').forEach(editor => {
                editor.addEventListener('dblclick', function (e) {
                    e.stopPropagation();
                    const th = this.closest('th');
                    const currentDate = th.dataset.col;
                    if (!currentDate) return;
                    if (dates.indexOf(currentDate) === 0) {
                        alert('基准日不可修改');
                        return;
                    }
                    this.contentEditable = true;
                    this.focus();
                    const range = document.createRange();
                    range.selectNodeContents(this);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                });
                editor.addEventListener('blur', function () {
                    this.contentEditable = false;
                    const newDate = this.textContent.trim();
                    const th = this.closest('th');
                    const oldDate = th.dataset.col;
                    if (!oldDate || newDate === oldDate) return;
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) {
                        alert('日期格式无效，请使用 YYYY-MM-DD');
                        this.textContent = oldDate;
                        return;
                    }
                    if (dates.includes(newDate) && newDate !== oldDate) {

        // ================================================================
        //  ★★★ 渲染排名表（各指标当天总变化率排名） ★★★
        // ================================================================
        function renderRankTable() {
            if (seriesKeys.length === 0 || dates.length === 0) {
                rankHead.innerHTML = '';
                rankBody.innerHTML = '';
                return;
            }

            // 构建表头：第一列为"指标"，后续为所有日期（从第一天开始，但排名从第二天开始计算）
            let headHtml = `<tr><th style="text-align:left; padding-left:8px;">📊 指标</th>`;
            dates.forEach(dateStr => {
                headHtml += `<th style="cursor:default;">${dateStr}</th>`;
            });
            headHtml += `</tr>`;
            rankHead.innerHTML = headHtml;

            // 预计算每天各指标的排名（从第二天开始，第一天不参与排名）
            // 存储 rankMap[dateIndex][key] = 排名 (1-based)
            const rankMap = {};
            for (let i = 1; i < dates.length; i++) {
                const changes = [];
                seriesKeys.forEach(key => {
                    const s = getSeries(key);
                    if (!s) return;
                    const base = s.data[0];
                    const curr = s.data[i];
                    const change = calcTotalChange(base, curr);
                    changes.push({ key, change });
                });
                // 按总变化率从高到低排序
                const sorted = changes.sort((a, b) => b.change - a.change);
                // 生成排名映射
                const dayRank = {};
                sorted.forEach((item, idx) => {
                    dayRank[item.key] = idx + 1;
                });
                rankMap[i] = dayRank;
            }

            // 构建表体：每行一个指标
            let bodyHtml = '';
            seriesKeys.forEach(key => {
                const s = getSeries(key);
                if (!s) return;
                const color = s.color || '#3b82f6';
                bodyHtml += `<tr data-row="${key}">`;
                // 第一列：指标名称
                bodyHtml += `<td class="row-label" style="text-align:left; padding-left:8px; font-weight:600;">
                        <span class="color-dot" style="background:${color};"></span> ${key}
                    </td>`;
                // 遍历每个日期
                dates.forEach((date, idx) => {
                    let displayText = '';
                    let rankColor = '#1e293b';
                    if (idx === 0) {
                        // 基准日不排名
                        displayText = '—';
                        rankColor = 'var(--text-muted)';
                    } else {
                        const rank = rankMap[idx]?.[key];
                        if (rank !== undefined) {
                            if (rank === 1) { rankColor = '#f59e0b'; displayText = '🥇'; }
                            else if (rank === 2) { rankColor = '#94a3b8'; displayText = '🥈'; }
                            else if (rank === 3) { rankColor = '#cd7f32'; displayText = '🥉'; }
                            else { displayText = rank; rankColor = '#1e293b'; }
                        } else {
                            displayText = '—';
                            rankColor = 'var(--text-muted)';
                        }
                    }
                    bodyHtml += `<td style="text-align:center; font-weight:600; color:${rankColor}; font-size:14px;">${displayText}</td>`;
                });
                bodyHtml += `</tr>`;
            });
            rankBody.innerHTML = bodyHtml;
            if (rankScroll) rankScroll.scrollTop = rankScroll.scrollHeight;
        }

        // ================================================================
        //  ★★★ 渲染统计表（获第一天数 · 正负天数） ★★★
        // ================================================================
        function renderStatsTable() {
            if (seriesKeys.length === 0) {
                statsHead.innerHTML = '';
                statsBody.innerHTML = '';
                return;
            }

            // 总交易日数（排除基准行）
            const totalDays = dates.length;
            const tradingDays = Math.max(0, totalDays - 1);

            // 第一步：计算每个指标"总变化率为正/负"的天数
            const positiveDays = {};
            const negativeDays = {};
            seriesKeys.forEach(key => {
                const s = getSeries(key);
                if (!s) return;
                const base = s.data[0];
                let pos = 0, neg = 0;
                for (let i = 1; i < s.data.length; i++) {
                    const totalChange = calcTotalChange(base, s.data[i]);
                    if (totalChange > 0) pos++;
                    else if (totalChange < 0) neg++;
                }
                positiveDays[key] = pos;
                negativeDays[key] = neg;
            });

            // 第二步：计算每个指标"获第一天数"（每天排名第一的次数）
            const firstPlaceDays = {};
            seriesKeys.forEach(key => { firstPlaceDays[key] = 0; });
            for (let i = 0; i < dates.length; i++) {
                const changes = [];
                seriesKeys.forEach(key => {
                    const s = getSeries(key);
                    if (!s) return;
                    const base = s.data[0];
                    const curr = s.data[i];
                    const change = calcTotalChange(base, curr);
                    changes.push({ key, change });
                });
                const sorted = changes.sort((a, b) => b.change - a.change);
                if (sorted.length > 0) {
                    const firstKey = sorted[0].key;
                    firstPlaceDays[firstKey] = (firstPlaceDays[firstKey] || 0) + 1;
                }
            }

            // ★★★ 新增：计算每个指标跑赢上证的天数 ★★★
            const shSeries = getSeries('上证');
            const beatSHCount = {};
            seriesKeys.forEach(key => {
                beatSHCount[key] = 0;
                const s = getSeries(key);
                if (!s || !shSeries) return;
                const baseS = s.data[0];
                const baseSH = shSeries.data[0];
                for (let i = 1; i < dates.length; i++) {
                    const changeS = calcTotalChange(baseS, s.data[i]);
                    const changeSH = calcTotalChange(baseSH, shSeries.data[i]);
                    if (changeS > changeSH) {
                        beatSHCount[key]++;
                    }
                }
            });

            // 表头
            const isPercent = statsDisplayMode === 'percent';
            const modeLabel = isPercent ? '（%）' : '（天数）';
            let headHtml = `<tr>
            <th style="text-align:left; padding-left:8px;">📊 指标</th>
            <th style="text-align:center;">🏆 登顶 ${modeLabel}</th>
            <th style="text-align:center;">📈 收益为正 ${modeLabel}</th>
            <th style="text-align:center;">📉 收益为负 ${modeLabel}</th>
            <th style="text-align:center;">📊 跑赢上证 ${modeLabel}</th>
        </tr>`;
            statsHead.innerHTML = headHtml;

            // 辅助函数：格式化数值
            const formatValue = (count, total = tradingDays) => {
                if (isPercent) {
                    if (total === 0) return '0.0%';
                    return (count / total * 100).toFixed(1) + '%';
                }
                return count;
            };

            let bodyHtml = '';
            seriesKeys.forEach(key => {
                const s = getSeries(key);
                if (!s) return;
                const color = s.color || '#3b82f6';
                const firstCount = firstPlaceDays[key] || 0;
                const posCount = positiveDays[key] || 0;
                const negCount = negativeDays[key] || 0;
                const beatCount = beatSHCount[key] || 0;

                bodyHtml += `<tr>
                <td style="text-align:left; padding-left:8px; font-weight:600;">
                    <span class="color-dot" style="background:${color};"></span> ${key}
                </td>
                <td style="text-align:center; font-weight:600; color:#f59e0b;">${formatValue(firstCount, tradingDays)}</td>
                <td style="text-align:center; font-weight:600; color:#16a34a;">${formatValue(posCount, tradingDays)}</td>
                <td style="text-align:center; font-weight:600; color:#dc2626;">${formatValue(negCount, tradingDays)}</td>
                <td style="text-align:center; font-weight:600; color:#3b82f6;">${shSeries ? formatValue(beatCount, tradingDays) : '—'}</td>
            </tr>`;
            });
            statsBody.innerHTML = bodyHtml;
            if (statsScroll) statsScroll.scrollTop = statsScroll.scrollHeight;
        }

        // ================================================================
        //  股票代码格式化
        // ================================================================
        function formatStockCode(code) {
            if (!code) return '';
            let c = code.trim();
            c = c.replace(/\.us$/i, '');
            const prefixMatch = c.match(/^(sh|sz|hk|us)/i);
            if (prefixMatch) {
                const prefix = prefixMatch[1].toLowerCase();
                const body = c.substring(prefixMatch[0].length);
                if (prefix === 'us') return 'us' + body.toUpperCase();
                return prefix + body;
            }
            if (/^\d{6}$/.test(c)) {
                const prefix = c.startsWith('6') ? 'sh' : 'sz';
                return prefix + c;
            }
            if (/^[a-zA-Z]+$/.test(c)) {
                return 'us' + c.toUpperCase();
            }
            return c;
        }

        function parseTencentData(rawData) {
            const result = {};
            const lines = rawData.split(';');
            lines.forEach(line => {
                if (!line.trim()) return;
                const match = line.match(/v_(\w+)="(.+)"/);
                if (!match) return;
                const code = match[1];
                const fields = match[2].split('~');
                if (fields.length < 35) return;
                let price = parseFloat(fields[3]) || 0;
                let prevClose = parseFloat(fields[4]) || 0;
                if (price === 0 && prevClose !== 0) price = prevClose;
                let updateTime = fields[30] || '';
                let datePart = '';
                if (updateTime.match(/^\d{8}/)) {
                    datePart = updateTime.slice(0, 4) + '-' + updateTime.slice(4, 6) + '-' + updateTime.slice(6, 8);
                } else if (updateTime.match(/^\d{4}-\d{2}-\d{2}/)) {
                    datePart = updateTime.slice(0, 10);
                }
                result[code] = {
                    name: fields[1] || code,
                    price: price,
                    prevClose: prevClose,
                    open: parseFloat(fields[5]) || 0,
                    high: parseFloat(fields[33]) || 0,
                    low: parseFloat(fields[34]) || 0,
                    volume: parseInt(fields[36]) || 0,
                    amount: parseFloat(fields[37]) || 0,
                    change: parseFloat(fields[31]) || 0,
                    changePercent: parseFloat(fields[32]) || 0,
                    updateTime: datePart || updateTime
                };
            });
            return result;
        }

        async function fetchTencentQuotes(codes) {
            if (!codes || codes.length === 0) return {};
            const formatted = codes.map(c => formatStockCode(c));
            const codeStr = formatted.join(',');
            const url = `https://qt.gtimg.cn/q=${codeStr}`;
            try {
                const response = await fetch(url, {
                    headers: { 'Referer': 'https://finance.sina.com.cn' }
                });
                if (!response.ok) throw new Error('网络响应异常');
                const rawData = await response.text();
                return parseTencentData(rawData);
            } catch (err) {
                console.warn('腾讯接口请求失败:', err);
                return {};
            }
        }

        function fetchSinaQuotes(codes) {
            return new Promise((resolve, reject) => {
                if (!codes || codes.length === 0) { resolve({}); return; }
                const aStockCodes = codes.filter(c => /^(sh|sz)/i.test(c));
                if (aStockCodes.length === 0) {
                    reject(new Error('新浪接口不支持美股/港股，请使用腾讯接口'));
                    return;
                }
                const formatted = aStockCodes.map(c => formatStockCode(c));
                const codeStr = formatted.join(',');
                const script = document.createElement('script');
                script.src = `https://hq.sinajs.cn/list=${codeStr}`;
                let resolved = false;
                const timeout = setTimeout(() => {
                    cleanup();
                    if (!resolved) {
                        resolved = true;
                        reject(new Error('新浪接口超时'));
                    }
                }, 8000);
                const cleanup = () => {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    clearTimeout(timeout);
                };
                script.onload = function () {
                    const result = {};
                    formatted.forEach(code => {
                        const varName = `hq_str_${code}`;
                        if (window[varName]) {
                            const parts = window[varName].split(',');
                            if (parts.length >= 6) {
                                result[code] = {
                                    name: parts[0] || code,
                                    price: parseFloat(parts[3]) || 0,
                                    prevClose: parseFloat(parts[2]) || 0,
                                    open: parseFloat(parts[1]) || 0,
                                    high: parseFloat(parts[4]) || 0,
                                    low: parseFloat(parts[5]) || 0,
                                    updateTime: (parts[30] || '') + ' ' + (parts[31] || '')
                                };
                            }
                        }
                        delete window[varName];
                    });
                    cleanup();
                    if (!resolved) {
                        resolved = true;
                        resolve(result);
                    }
                };
                script.onerror = function () {
                    cleanup();
                    if (!resolved) {
                        resolved = true;
                        reject(new Error('新浪接口加载失败'));
                    }
                };
                document.head.appendChild(script);
            });
        }

        // ================================================================
        //  辅助函数：灵活匹配股票代码（修复指数代码匹配问题）
        // ================================================================
        function findQuote(quotes, code) {
            if (!code || !quotes) return null;
            const formatted = formatStockCode(code);
            const candidates = [
                formatted,
                code,
                formatted.toLowerCase(),
                formatted.toUpperCase(),
                code.replace(/^[a-zA-Z]+/, ''),
                formatted.replace(/^[a-zA-Z]+/, ''),
                code.toLowerCase(),
                code.toUpperCase(),
                'sh' + code,
                'sz' + code,
                'hk' + code,
                'us' + code,
            ];
            const uniqueCandidates = [...new Set(candidates)];
            for (const key of uniqueCandidates) {
                if (quotes[key] && typeof quotes[key] === 'object' && quotes[key].price > 0) {
                    return quotes[key];
                }
            }
            return null;
        }

        // ================================================================
        //  ★★★ 实时股价更新（采用前复权价格，与历史K线一致） ★★★
        // ================================================================
        async function refreshPrices() {
            if (isRefreshing) return;

            const codeMap = {};
            seriesList.forEach(s => {
                if (s.code && s.code.trim()) {
                    codeMap[s.name] = s.code.trim();
                }
            });
            const codes = Object.values(codeMap);
            if (codes.length === 0) {
                setStatus('info', '没有股票代码，请先输入');
                return;
            }

            seriesList.forEach(s => s.updateStatus = 'idle');

            isRefreshing = true;
            refreshPriceIconBtn.disabled = true;
            setStatus('loading', '获取实时行情...');

            let quotes = null;
            let usedApi = '';

            try {
                quotes = await fetchTencentQuotes(codes);
                usedApi = '腾讯';
                const hasData = Object.values(quotes).some(q => q && q.price > 0);
                if (!hasData) {
                    console.warn('腾讯返回空数据，尝试新浪');
                    quotes = await fetchSinaQuotes(codes);
                    usedApi = '新浪';
                }
            } catch (err) {
                console.warn('腾讯失败，尝试新浪:', err);
                try {
                    quotes = await fetchSinaQuotes(codes);
                    usedApi = '新浪';
                } catch (err2) {
                    console.error('所有接口失败:', err2);
                    setStatus('error', '获取数据失败，请稍后重试');
                    isRefreshing = false;
                    refreshPriceIconBtn.disabled = false;
                    return;
                }
            }

            let latestDataDate = null;
            for (const quote of Object.values(quotes)) {
                if (quote && quote.updateTime) {
                    const dateStr = quote.updateTime.split(' ')[0];
                    if (dateStr && /^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                        if (!latestDataDate || dateStr > latestDataDate) {
                            latestDataDate = dateStr;
                        }
                    }
                }
            }

            const today = getTodayStr();
            const targetDate = latestDataDate || today;

            if (!dates.includes(targetDate)) {
                const oldLen = dates.length;
                dates.push(targetDate);
                seriesList.forEach(s => {
                    const prevIdx = oldLen - 1;
                    const prevVal = (prevIdx >= 0 && prevIdx < s.data.length) ? s.data[prevIdx] : (s.data[0] || 1);
                    s.data.push(prevVal);
                });
                sortAllData();
            }

            const targetIdx = dates.indexOf(targetDate);
            if (targetIdx === -1) {
                setStatus('error', '日期处理异常');
                isRefreshing = false;
                refreshPriceIconBtn.disabled = false;
                return;
            }

            let updatedCount = 0;
            const todayStr = getTodayStr();
            if (targetDate !== todayStr) {
                setStatus('info', `非交易日，最新数据日期: ${targetDate}`);
            } else {
                setStatus('loading', '获取复权价格中...');
            }

            const entries = Object.entries(codeMap);
            const total = entries.length;

            const tasks = entries.map(async ([name, code], index) => {
                const s = getSeries(name);
                if (!s) return null;

                const quote = findQuote(quotes, code);
                let price = (quote && quote.price > 0) ? quote.price : 0;

                const isUSStock = code.trim().toUpperCase().startsWith('US');

                if (!isUSStock) {
                    let formattedCode = formatStockCode(code);
                    if (/^\d{5,6}$/.test(formattedCode)) {
                        if (formattedCode.startsWith('6')) {
                            formattedCode = 'sh' + formattedCode;
                        } else {
                            formattedCode = 'sz' + formattedCode;
                        }
                    }
                    if (/^[A-Z]{1,5}$/.test(formattedCode) && !formattedCode.startsWith('us')) {
                        formattedCode = 'us' + formattedCode;
                    }
                    if (/^\d{5}$/.test(formattedCode) && !formattedCode.startsWith('hk')) {
                        formattedCode = 'hk' + formattedCode;
                    }

                    const qfqUrl =
                        `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${formattedCode},day,${targetDate},${targetDate},1,qfq`;
                    try {
                        const resp = await fetch(qfqUrl, {
                            mode: 'cors',
                            headers: { 'Referer': 'https://finance.sina.com.cn' }
                        });
                        if (resp.ok) {
                            const json = await resp.json();
                            const dataKey = formattedCode;
                            let qfqData = json?.data?.[dataKey]?.qfqday || json?.data?.[dataKey]?.day;
                            if (qfqData && Array.isArray(qfqData) && qfqData.length > 0) {
                                const qfqPrice = parseFloat(qfqData[0][2]);
                                if (!isNaN(qfqPrice) && qfqPrice > 0) {
                                    if (price > 0) {
                                        const diffPercent = Math.abs((qfqPrice - price) / price) * 100;
                                        if (diffPercent < 20) {
                                            price = qfqPrice;
                                            console.log(`[${name}] 使用前复权价格: ${qfqPrice} (实时价: ${price})`);
                                        } else {
                                            console.warn(`[${name}] 复权价与实时价差异过大 (${diffPercent.toFixed(2)}%)，使用实时价`);
                                        }
                                    } else {
                                        price = qfqPrice;
                                        console.log(`[${name}] 使用前复权价格: ${qfqPrice}`);
                                    }
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`[${name}] 获取复权价失败，使用实时价`, e);
                    }
                } else {
                    console.log(`[${name}] 美股跳过复权请求，使用实时价: ${price}`);
                }

                setStatus('loading', `获取价格中 (${index + 1}/${total})...`);

                return { name, price, s };
            });

            const results = await Promise.all(tasks);

            for (const result of results) {
                if (!result) continue;
                const { name, price, s } = result;
                if (price > 0) {
                    s.data[targetIdx] = price;
                    updateLinkedCells(targetIdx, name);
                    updatedCount++;
                    s.updateStatus = 'success';
                } else {
                    s.updateStatus = 'error';
                }
            }

            const px = getSeries('飘小仙');
            if (px) {
                px.data = px.data.map(() => 1);
            }

            sortAllData();
            renderTables();
            renderChart();
            resetDanmaku();
            saveState();

            const statusMsg = targetDate !== todayStr ?
                `已更新 ${updatedCount} 只股票 (${usedApi}，采用前复权价格)，最新数据日期: ${targetDate}（非交易日）` :
                `已更新 ${updatedCount} 只股票 (${usedApi}，采用前复权价格)，日期已对齐至 ${targetDate}`;
            setStatus('success', statusMsg);
            lastUpdateTime.textContent = '更新于 ' + new Date().toLocaleTimeString();

            isRefreshing = false;
            refreshPriceIconBtn.disabled = false;
        }

        // ================================================================
        //  ★★★ 历史数据校验（基于腾讯K线） ★★★
        // ================================================================
        async function verifyHistoricalData() {
            const codeMap = {};
            seriesList.forEach(s => {
                if (s.code && s.code.trim()) {
                    codeMap[s.name] = s.code.trim();
                }
            });
            const names = Object.keys(codeMap);
            if (names.length === 0) {
                alert('⚠️ 请先为指标输入股票代码\n\n格式示例：\n• A股：sh000001、sz000625\n• 港股：hk01810\n• 美股：usNVDA');
                return;
            }

            const startDate = dates[0];
            const endDate = dates[dates.length - 1];
            const dayDiff = Math.ceil((new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24)) + 20;
            const count = Math.min(Math.max(dayDiff, 50), 500);

            let updatedCount = 0;
            let totalMatched = 0;
            const errors = [];

            setStatus('loading', `历史校验中 (${names.length} 只)...`);

            for (const name of names) {
                const code = codeMap[name];
                const s = getSeries(name);
                if (!s) continue;

                let formattedCode = formatStockCode(code);

                if (/^\d{5,6}$/.test(formattedCode)) {
                    if (formattedCode.startsWith('6')) {
                        formattedCode = 'sh' + formattedCode;
                    } else {
                        formattedCode = 'sz' + formattedCode;
                    }
                }
                if (/^[A-Z]{1,5}$/.test(formattedCode) && !formattedCode.startsWith('us')) {
                    formattedCode = 'us' + formattedCode;
                }
                if (/^\d{5}$/.test(formattedCode) && !formattedCode.startsWith('hk')) {
                    formattedCode = 'hk' + formattedCode;
                }

                console.log(`[${name}] 原始代码: ${code} → 格式化: ${formattedCode}`);

                const url =
                    `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${formattedCode},day,${startDate},${endDate},${count},qfq`;

                try {
                    const response = await fetch(url, {
                        mode: 'cors',
                        headers: { 'Referer': 'https://finance.sina.com.cn' }
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const json = await response.json();

                    let klineData = null;
                    const dataKey = formattedCode;

                    if (json?.data?.[dataKey]?.qfqday) {
                        klineData = json.data[dataKey].qfqday;
                        console.log(`[${name}] 使用 qfqday (前复权)`);
                    } else if (json?.data?.[dataKey]?.day) {
                        klineData = json.data[dataKey].day;
                        console.log(`[${name}] 使用 day (不复权)`);
                    } else if (json?.data) {
                        for (const key of Object.keys(json.data)) {
                            if (json.data[key]?.qfqday && Array.isArray(json.data[key].qfqday)) {
                                klineData = json.data[key].qfqday;
                                console.log(`[${name}] 使用备用 key: ${key} (qfqday)`);
                                break;
                            }
                            if (json.data[key]?.day && Array.isArray(json.data[key].day)) {
                                klineData = json.data[key].day;
                                console.log(`[${name}] 使用备用 key: ${key} (day)`);
                                break;
                            }
                        }
                    }

                    if (!klineData || !Array.isArray(klineData) || klineData.length === 0) {
                        console.warn(`[${name}] 无历史K线数据，URL: ${url}`);
                        errors.push(`${name}: 无数据返回`);
                        s.updateStatus = 'error';
                        continue;
                    }

                    console.log(`[${name}] 获取到 ${klineData.length} 条K线数据`);

                    const priceMap = {};
                    klineData.forEach(row => {
                        if (row && row.length >= 3) {
                            const dateStr = row[0];
                            const close = parseFloat(row[2]);
                            if (dateStr && !isNaN(close) && close > 0) {
                                priceMap[dateStr] = close;
                            }
                        }
                    });

                    const dateKeys = Object.keys(priceMap);
                    console.log(
                        `[${name}] 可匹配的日期范围: ${dateKeys[0] || '无'} ~ ${dateKeys[dateKeys.length - 1] || '无'}`
                    );
                    console.log(
                        `[${name}] 你的日期范围: ${dates[0]} ~ ${dates[dates.length - 1]}`);

                    let matched = 0;
                    for (let i = 0; i < dates.length; i++) {
                        const d = dates[i];
                        if (priceMap[d] !== undefined) {
                            s.data[i] = priceMap[d];
                            matched++;
                            totalMatched++;
                            updateLinkedCells(i, name);
                        }
                    }

                    if (matched > 0) {
                        updatedCount++;
                        s.updateStatus = 'success';
                        console.log(`[${name}] ✅ 更新了 ${matched} 条历史数据`);
                    } else {
                        s.updateStatus = 'error';
                        const firstKlineDate = dateKeys[0];
                        const lastKlineDate = dateKeys[dateKeys.length - 1];
                        if (firstKlineDate && lastKlineDate) {
                            console.warn(
                                `[${name}] 你的日期 (${dates[0]} ~ ${dates[dates.length - 1]}) 不在K线范围 (${firstKlineDate} ~ ${lastKlineDate}) 内`
                            );
                            errors.push(`${name}: 日期范围不匹配 (K线: ${firstKlineDate} ~ ${lastKlineDate})`);
                        } else {
                            errors.push(`${name}: 无匹配数据`);
                        }
                    }

                } catch (err) {
                    console.error(`[${name}] 获取历史数据失败:`, err);
                    errors.push(`${name}: ${err.message || '网络错误'}`);
                    s.updateStatus = 'error';
                }
            }

            const px = getSeries('飘小仙');
            if (px) {
                px.data = px.data.map(() => 1);
            }

            renderTables();
            renderChart();
            resetDanmaku();
            saveState();

            let msg = `📊 历史校验完成\n\n`;
            msg += `✅ 更新: ${updatedCount} 只股票，共 ${totalMatched} 条数据\n`;
            if (errors.length > 0) {
                msg += `\n⚠️ 失败详情:\n${errors.map(e => `  • ${e}`).join('\n')}`;
            }
            if (updatedCount === 0) {
                msg += `\n\n💡 建议:\n`;
                msg += `1. 检查股票代码是否正确（如 sh000001、usNVDA）\n`;
                msg += `2. 检查日期是否为交易日（周末/节假日无数据）\n`;
                msg += `3. 打开控制台查看详细日志 (F12)`;
            }

            alert(msg);
            setStatus(updatedCount > 0 ? 'success' : 'error',
                `校验完成: ${updatedCount} 只更新，${totalMatched} 条匹配`);
            lastUpdateTime.textContent = '校验于 ' + new Date().toLocaleTimeString();
        }

        // ================================================================

        function setStatus(type, msg) {
            const dot = statusDot;
            const text = statusText;
            dot.className = 'dot';
            if (type === 'loading') {
                dot.classList.add('active');
                text.textContent = msg || '刷新中...';
            } else if (type === 'success') {
                dot.classList.add('active');
                text.textContent = msg || '已更新';
            } else if (type === 'error') {
                dot.classList.add('error');
                text.textContent = msg || '错误';
            } else if (type === 'info') {
                dot.classList.add('idle');
                text.textContent = msg || '就绪';
            } else {
                dot.classList.add('idle');
                text.textContent = msg || '就绪';
            }
        }

        // ================================================================
        //  头像位置缓存（悬停检测，仅在趋势图模式下有效）
        // ================================================================
        let avatarPositions = [];

        function updateAvatarPositions() {
            if (viewMode === 'waterfall') return;
            const latestIdx = dates.length - 1;
            const grid = myChart.getModel().getComponent('grid');
            if (!grid) return;
            avatarPositions = [];
            seriesKeys.forEach(key => {
                const s = getSeries(key);
                if (!s) return;
                const base = s.data[0];
                const latestVal = s.data[latestIdx];
                const change = calcTotalChange(base, latestVal);
                const coord = myChart.convertToPixel('grid', [latestIdx, change]);
                if (coord && !isNaN(coord[0]) && !isNaN(coord[1])) {
                    avatarPositions.push({
                        seriesName: key,
                        color: s.color,
                        remark: s.remark || '',
                        coord: coord,
                        change: change
                    });
                }
            });
        }

        function initCustomTooltip() {
            myChart.off('mouseover');
            myChart.off('mouseout');
            chartContainer.addEventListener('mousemove', function (e) {
                if (viewMode === 'waterfall') {
                    customTooltip.style.display = 'none';
                    return;
                }
                const rect = chartContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const threshold = 30;
                let matched = [];
                avatarPositions.forEach(item => {
                    const dx = x - item.coord[0];
                    const dy = y - item.coord[1];
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < threshold) { matched.push(item); }
                });
                if (matched.length > 0) {
                    let html = '';
                    matched.forEach((item) => {
                        const color = item.color || '#3b82f6';
                        html += `<div class="tooltip-item">
                                        <span class="color-dot" style="background:${color};"></span>
                                        <span class="series-name">${item.seriesName}</span>
                                        ${item.remark ? `<span class="remark">· ${item.remark}</span>` : ''}
                                    </div>`;
                    });
                    customTooltip.innerHTML = html;
                    customTooltip.style.display = 'block';
                    let left = e.clientX + 12;
                    let top = e.clientY - 10;
                    const tw = customTooltip.offsetWidth || 200;
                    const th = customTooltip.offsetHeight || 100;
                    if (left + tw > window.innerWidth - 10) left = e.clientX - tw - 12;
                    if (top + th > window.innerHeight - 10) top = window.innerHeight - th - 10;
                    if (top < 10) top = 10;
                    customTooltip.style.left = left + 'px';
                    customTooltip.style.top = top + 'px';
                } else {
                    customTooltip.style.display = 'none';
                }
            });
            chartContainer.addEventListener('mouseleave', function () {
                customTooltip.style.display = 'none';
            });
            myChart.on('dataZoom', updateAvatarPositions);
        }
