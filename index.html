        // ================================================================
        //  ★★★ 瀑布图渲染函数 ★★★
        // ================================================================
        // ================================================================
        //  ★★★ 瀑布图渲染函数（支持图例切换所有系列） ★★★
        // ================================================================
        function renderWaterfall() {
            // ★★★ 先清空图表，避免趋势图残留 ★★★
            myChart.clear();

            const targetName = waterfallSeriesName || (seriesKeys[0] || '');
            const s = getSeries(targetName);
            if (!s || s.data.length < 2) {
                myChart.setOption({
                    title: {
                        text: '请选择一个系列查看瀑布图',
                        left: 'center',
                        top: 'center',
                        textStyle: { color: 'var(--text-muted)', fontSize: 16 }
                    },
                    series: []
                }, true);
                return;
            }

            const isDark = document.body.classList.contains('dark');

            // 为每个系列生成数据
            const allSeriesData = {};
            seriesKeys.forEach(key => {
                const series = getSeries(key);
                if (!series) return;
                const data = series.data;
                const base = data[0];
                const totalChanges = data.map(v => calcTotalChange(base, v));
                const baseData = totalChanges.map((v, i) => i === 0 ? 0 : totalChanges[i - 1]);
                const chartData = dates.map((d, i) => [d, baseData[i], totalChanges[i]]);
                allSeriesData[key] = {
                    totalChanges,
                    baseData,
                    chartData,
                    dayChanges: totalChanges.map((v, i) => i === 0 ? v : v - totalChanges[i - 1])
                };
            });

            // 渲染函数
            function renderItem(params, api) {
                const dataIndex = params.dataIndex;
                const xValue = api.value(0);
                const startY = api.value(1);
                const endY = api.value(2);

                const coordStart = api.coord([xValue, startY]);
                const coordEnd = api.coord([xValue, endY]);

                if (!coordStart || !coordEnd) return null;

                const bandWidth = 30; // 固定柱宽，避免 bandWidth 返回 undefined
                const x = coordStart[0] - bandWidth / 2;
                const y = Math.min(coordStart[1], coordEnd[1]);
                const height = Math.abs(coordStart[1] - coordEnd[1]);

                const isUp = endY >= startY;
                const color = isUp ? '#e64340' : '#07c160';

                return {
                    type: 'rect',
                    shape: { x, y, width: bandWidth, height },
                    style: { fill: color, stroke: color, lineWidth: 1 },
                    children: [{
                        type: 'text',
                        style: {
                            text: startY.toFixed(2) + '%',
                            x: coordStart[0],
                            y: coordStart[1] + (isUp ? 16 : -8),
                            fill: '#6b7280',
                            fontSize: 10,
                            fontWeight: 'bold',
                            textAlign: 'center',
                            textBaseline: isUp ? 'top' : 'bottom'
                        }
                    }, {
                        type: 'text',
                        style: {
                            text: endY.toFixed(2) + '%',
                            x: coordStart[0],
                            y: coordEnd[1] + (isUp ? -8 : 16),
                            fill: '#000000',
                            fontSize: 10,
                            fontWeight: 'bold',
                            textAlign: 'center',
                            textBaseline: isUp ? 'bottom' : 'top'
                        }
                    }]
                };
            }

            // 构建所有系列
            const allSeries = [];
            seriesKeys.forEach(key => {
                const data = allSeriesData[key];
                if (!data) return;
                const color = getSeries(key)?.color || '#3b82f6';
                allSeries.push({
                    name: key,
                    type: 'custom',
                    data: data.chartData,
                    renderItem: renderItem,
                    encode: { x: 0, y: [1, 2] },
                    label: { show: false },
                    z: 2,
                    itemStyle: { color }
                });
                allSeries.push({
                    name: key,
                    type: 'line',
                    data: data.totalChanges,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { color, width: 2 },
                    itemStyle: { color },
                    z: 3,
                    label: {
                        show: true,
                        formatter: p => p.value.toFixed(2) + '%',
                        position: 'top',
                        fontSize: 10,
                        color: '#83a0d2',
                        fontWeight: 'bold'
                    }
                });
            });

            // 图例选中状态
            const legendSelected = {};
            seriesKeys.forEach(key => {
                legendSelected[key] = (key === targetName);
            });

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function (params) {
                        if (!params || params.length === 0) return '';
                        const p = params[0];
                        if (!p) return '';
                        const idx = p.dataIndex;
                        const data = allSeriesData[targetName];
                        if (!data) return '';
                        return `<strong>${dates[idx]}</strong><br/>起点: ${data.baseData[idx].toFixed(2)}%<br/>终点: ${data.totalChanges[idx].toFixed(2)}%<br/>日变化: ${data.dayChanges[idx].toFixed(2)}%`;
                    },
                    backgroundColor: isDark ? '#2d3748' : '#ffffff',
                    borderColor: isDark ? '#334155' : '#eef2f6',
                    textStyle: { color: isDark ? '#e2e8f0' : '#1e293b' }
                },
                legend: {
                    data: seriesKeys,
                    selected: legendSelected,
                    icon: 'circle',
                    top: 0,
                    left: 'center',
                    textStyle: { color: isDark ? '#94a3b8' : '#475569' }
                },
                grid: { left: 50, right: 30, top: 50, bottom: 60 },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisTick: { alignWithLabel: true },
                    splitLine: { show: false },
                    axisLabel: {
                        color: isDark ? '#94a3b8' : '#475569',
                        fontSize: 12,
                        formatter: val => val.split('-').slice(1).join('-')
                    },
                    axisLine: { lineStyle: { color: isDark ? '#334155' : '#eef2f6' } }
                },
                yAxis: {
                    type: 'value',
                    min: yMin,
                    max: yMax,
                    axisLabel: {
                        color: isDark ? '#94a3b8' : '#475569',
                        fontSize: 12,
                        formatter: value => value.toFixed(1) + '%'
                    },
                    splitLine: {
                        show: showGrid,
                        lineStyle: { color: isDark ? '#334155' : '#eef2f6', type: 'solid', opacity: 0.6 }
                    },
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                dataZoom: [{
                    type: 'slider',
                    start: 0,
                    end: 100,
                    height: 16,
                    bottom: 20,
                    borderColor: isDark ? '#334155' : '#eef2f6',
                    backgroundColor: isDark ? '#1e293b' : '#f8fafc',
                    fillerColor: 'rgba(59,130,246,0.12)',
                    handleStyle: { color: '#3b82f6', borderColor: '#3b82f6' },
                    textStyle: { color: isDark ? '#94a3b8' : '#475569', fontSize: 11 },
                    minSpan: 10,
                    maxSpan: 100
                }],
                series: allSeries
            };

            // ★★★ 设置前再次确保清空（安全） ★★★
            myChart.clear();
            myChart.setOption(option, true);
            myChart.resize();

            // 图例点击事件（切换系列）
            myChart.off('legendselectchanged');
            myChart.on('legendselectchanged', function (params) {
                if (params.name && seriesKeys.includes(params.name)) {
                    const newSelected = {};
                    seriesKeys.forEach(name => {
                        newSelected[name] = (name === params.name);
                    });
                    myChart.setOption({ legend: { selected: newSelected } });
                    waterfallSeriesName = params.name;
                    document.getElementById('waterfallSeriesSelect').value = params.name;
                    mainTitleInput.value = `🌊 瀑布图 · ${params.name}`;
                    renderWaterfall();
                    saveState();
                }
            });

            setTimeout(() => { resetDanmaku(); }, 100);
        }

                    },
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                dataZoom: [{
                    type: 'slider',
                    start: 0,
                    end: 100,
                    height: 16,
                    bottom: 20,
                    borderColor: 'var(--border-color)',
                    backgroundColor: 'var(--bg-panel)',
                    fillerColor: 'rgba(59,130,246,0.12)',
                    handleStyle: { color: '#3b82f6', borderColor: '#3b82f6' },
                    textStyle: { color: 'var(--text-muted)', fontSize: 11 },
                    minSpan: 10,
                    maxSpan: 100
                }],
                series: series
            };
            myChart.setOption(option, true);
            myChart.resize();

            // ★★★ 图例点击事件：支持多选（Ctrl+点击切换，普通点击单独选中） ★★★
            myChart.off('legendselectchanged');
            myChart.on('legendselectchanged', function (params) {
                if (params.name) {
                    const name = params.name;
                    // 使用全局 ctrlPressed 状态
                    const isCtrl = ctrlPressed;

                    if (isCtrl) {
                        // Ctrl+点击：切换该系列的选中状态
                        if (trendLegendSelected.has(name)) {
                            trendLegendSelected.delete(name);
                        } else {
                            trendLegendSelected.add(name);
                        }
                    } else {
                        // 普通点击：如果该系列已被选中，则恢复显示全部；否则只显示该系列
                        if (trendLegendSelected.size === 1 && trendLegendSelected.has(name)) {
                            // 再次点击已选中的唯一系列 → 恢复全部显示
                            trendLegendSelected.clear();
                        } else {
                            // 只显示该系列
                            trendLegendSelected.clear();
                            trendLegendSelected.add(name);
                        }
                    }

                    // 应用选中状态
                    const newSelected = {};
                    if (trendLegendSelected.size === 0) {
                        seriesKeys.forEach(key => { newSelected[key] = true; });
                    } else {
                        seriesKeys.forEach(key => {
                            newSelected[key] = trendLegendSelected.has(key);
                        });
                    }

                    // 只更新图例选中状态，不重新渲染整个图表（避免循环）
                    myChart.setOption({ legend: { selected: newSelected } });
                    // 保存状态到 localStorage
                    saveState();
                }
            });

            setTimeout(() => {
                updateAvatarPositions();
                resetDanmaku();
            }, 100);
        }

        // ================================================================
        //  Y轴控制 & 重置 & 滚轮缩放
        // ================================================================
        function updateYAxis() {
            let minVal = parseFloat(yMinSlider.value);
            let maxVal = parseFloat(yMaxSlider.value);
            if (minVal >= maxVal) {
                if (minVal >= 200) minVal = maxVal - 20;
                if (maxVal <= -100) maxVal = minVal + 20;
                if (minVal >= maxVal) minVal = maxVal - 50;
                yMinSlider.value = minVal;
                yMaxSlider.value = maxVal;
            }
            yMin = minVal;
            yMax = maxVal;
            yMinValue.textContent = minVal;
            yMaxValue.textContent = maxVal;
            renderChart();
            saveState();
        }
        yMinSlider.addEventListener('input', updateYAxis);
        yMaxSlider.addEventListener('input', updateYAxis);

        function resetYAxis() {
            if (viewMode === 'waterfall') {
                const targetName = waterfallSeriesName || (seriesKeys[0] || '');
                const s = getSeries(targetName);
                if (!s || s.data.length < 2) return;
                const base = s.data[0];
                const totalChanges = s.data.map(v => calcTotalChange(base, v));
                const dayChanges = totalChanges.map((v, i) => i === 0 ? v : v - totalChanges[i - 1]);
                const allValues = [...dayChanges, ...totalChanges];
                let min = Math.min(...allValues);
                let max = Math.max(...allValues);
                const padding = (max - min) * 0.15 || 10;
                min = Math.floor(min - padding);
                max = Math.ceil(max + padding);
                min = Math.max(-200, min);
                max = Math.min(300, max);
                yMinSlider.value = min;
                yMaxSlider.value = max;
                updateYAxis();
                return;
            }

            let allChanges = [];
            seriesList.forEach(s => {
                const base = s.data[0];
                s.data.forEach(v => { allChanges.push(calcTotalChange(base, v)); });
            });
            if (allChanges.length === 0) return;
            let min = Math.min(...allChanges);
            let max = Math.max(...allChanges);
            const padding = (max - min) * 0.15 || 10;
            min = Math.floor(min - padding);
            max = Math.ceil(max + padding);
            min = Math.max(-200, min);
            max = Math.min(300, max);
            yMinSlider.value = min;
            yMaxSlider.value = max;
            updateYAxis();
        }
        resetYBtnChart.addEventListener('click', resetYAxis);
        chartDom.addEventListener('dblclick', resetYAxis);

        resetZoomBtnChart.addEventListener('click', function () {
            myChart.dispatchAction({ type: 'dataZoom', start: 0, end: 100, dataZoomIndex: 0 });
        });
        chartContainer.addEventListener('wheel', function (e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 1 : -1;
            const step = 5;
            let newMin = yMin + delta * step;
            let newMax = yMax - delta * step;
            if (newMin >= newMax) { newMin = newMax - 20; }
            newMin = Math.max(-200, Math.min(100, newMin));
            newMax = Math.max(0, Math.min(300, newMax));
            if (newMin < newMax) {
                yMinSlider.value = newMin;
                yMaxSlider.value = newMax;
                updateYAxis();
            }
        }, { passive: false });

        // ================================================================
        //  其他事件
        // ================================================================
        mainTitleInput.addEventListener('blur', function () {
            mainTitle = this.value;
            saveState();
        });
        mainTitleInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') this.blur(); });

        themeToggle.addEventListener('click', function () {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            this.textContent = isDark ? '☀️' : '🌙';
            saveState();
            renderChart();
        });

        gridToggle.addEventListener('click', function () {
            showGrid = !showGrid;
            this.textContent = showGrid ? '📏 网格线' : '📏 隐藏网格';
            renderChart();
            saveState();
        });

        let expanded = true;
        expandBtn.addEventListener('click', function () {
            expanded = !expanded;
            appContainer.classList.toggle('edit-expanded', expanded);
            this.textContent = expanded ? '🔍 缩小还原' : '🔍 放大编辑';
            if (!expanded) {
                chartWrapper.style.flex = '';
                controlPanel.style.flex = '';
                saveState();
            }
            requestAnimationFrame(() => {
                myChart.resize();
                setTimeout(() => {
                    myChart.resize();
                    resetDanmaku();
                    updateAvatarPositions();
                }, 100);
            });
        });

        let seriesCollapsed = false;
        collapseSeriesBtn.addEventListener('click', function () {
            seriesCollapsed = !seriesCollapsed;
            seriesManager.classList.toggle('collapsed', seriesCollapsed);
            this.textContent = seriesCollapsed ? '▶' : '▼';
        });

        // ================================================================
        //  按钮事件绑定
        // ================================================================
        addDateBtn.addEventListener('click', insertDateColumn);
        delDateBtn.addEventListener('click', deleteDateColumn);
        addColBtn.addEventListener('click', addColumn);
        refreshPriceIconBtn.addEventListener('click', refreshPrices);
        // ★★★ 统计表切换按钮事件 ★★★
        document.getElementById('statsToggleBtn').addEventListener('click', function () {
            statsDisplayMode = statsDisplayMode === 'count' ? 'percent' : 'count';
            this.textContent = statsDisplayMode === 'percent' ? '📊 显示天数' : '📊 显示百分比';
            renderStatsTable();
            saveState();
        });
        document.getElementById('verifyHistoryBtn').addEventListener('click', verifyHistoricalData);

        // ================================================================
        //  窗口自适应
        // ================================================================
        function handleResize() {
            myChart.resize();
            resetDanmaku();
            updateAvatarPositions();
        }
        window.addEventListener('resize', handleResize);
        // ================================================================
        //  表格展开/收起按钮（显示全部数据）
        // ================================================================
        document.querySelectorAll('.expand-table-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.stopPropagation(); // 防止触发 details 的 toggle
                const targetId = this.dataset.target;
                const target = document.getElementById(targetId);
                if (!target) return;

                // 判断当前是否已展开（maxHeight 为 none 或空）
                const isExpanded = target.style.maxHeight === 'none' || target.style.maxHeight === '';

                if (isExpanded) {
                    // 收起：恢复原始高度
                    const original = target.dataset.originalHeight || '150px';
                    target.style.maxHeight = original;
                    this.textContent = '📏 显示全部';
                } else {
                    // 展开：保存原始高度（如果尚未保存）
                    if (!target.dataset.originalHeight) {
                        // 尝试从当前计算样式中获取 maxHeight
                        const computed = window.getComputedStyle(target).maxHeight;
                        if (computed && computed !== 'none') {
                            target.dataset.originalHeight = computed;
                        } else {
                            // 如果当前是 none 或未设置，则从 style 或默认 150px
                            target.dataset.originalHeight = target.style.maxHeight || '150px';
                        }
                    }
                    target.style.maxHeight = 'none';
                    this.textContent = '📏 收起';
                }
            });
        });
        // ================================================================
        //  初始化
        // ================================================================
        function init() {
            const loaded = loadState();
            if (!loaded) {
                processAllAvatars(() => {
                    yMinSlider.value = -50;
                    yMaxSlider.value = 150;
                    yMinValue.textContent = '-50';
                    yMaxValue.textContent = '150';
                    yMin = -50;
                    yMax = 150;
                    mainTitleInput.value = mainTitle;
                    gridToggle.textContent = showGrid ? '📏 网格线' : '📏 隐藏网格';
                    rawDetails.open = true;
                    dailyDetails.open = true;
                    totalDetails.open = true;
                    rankDetails.open = true;
                    statsDetails.open = true;
                    viewMode = 'trend';
                    waterfallSeriesName = seriesKeys[0] || '';
                    trendLegendSelected = new Set(); // ★★★ 初始全部显示

                    renderSeriesManager();
                    renderTables();
                    renderChart();
                    initCustomTooltip();
                    initChartClick();
                    initResizeHandles();
                    initResizer();
                    setStatus('info', '就绪');
                    danmakuEnabled = true;
                    danmakuToggle.classList.remove('disabled');
                    danmakuToggle.textContent = '💬';
                    updateViewUI();
                    saveState();
                    console.log('✅ 初始化完成（默认数据）');
                    setTimeout(() => { refreshPrices(); }, 2500);
                });
            } else {
                processAllAvatars(() => {
                    yMinSlider.value = yMin;
                    yMaxSlider.value = yMax;
                    yMinValue.textContent = yMin;
                    yMaxValue.textContent = yMax;
                    mainTitleInput.value = mainTitle;
                    gridToggle.textContent = showGrid ? '📏 网格线' : '📏 隐藏网格';
                    renderSeriesManager();
                    renderTables();
                    renderChart();
                    initCustomTooltip();
                    initChartClick();
                    initResizeHandles();
                    initResizer();
                    setStatus('info', '就绪');
                    updateViewUI();
                    console.log('✅ 数据已从 localStorage 恢复');
                    setTimeout(() => { refreshPrices(); }, 2500);
                });
            }
            // ★★★ 删除选中指标（只绑定一次） ★★★
            document.getElementById('deleteSelectedSeriesBtn').addEventListener('click', function () {
                const selectedItems = seriesManager.querySelectorAll('.series-item.selected');
                if (selectedItems.length === 0) {
                    alert('请先点击选择要删除的指标（点击指标行可选中/取消选中）');
                    return;
                }
                if (seriesKeys.length - selectedItems.length < 1) {
                    alert('至少保留一个指标');
                    return;
                }
                const names = Array.from(selectedItems).map(el => el.dataset.series);
                if (!confirm(`确定要删除选中的 ${names.length} 个指标吗？\n\n${names.join('、')}`)) return;
                const sorted = names.sort((a, b) => seriesKeys.indexOf(b) - seriesKeys.indexOf(a));
                for (const name of sorted) {
                    const idx = seriesKeys.indexOf(name);
                    if (idx !== -1) {
                        seriesKeys.splice(idx, 1);
                        const sIdx = seriesList.findIndex(s => s.name === name);
                        if (sIdx !== -1) seriesList.splice(sIdx, 1);
                        if (trendLegendSelected.has(name)) trendLegendSelected.delete(name);
                        if (waterfallSeriesName === name) {
                            waterfallSeriesName = seriesKeys[0] || '';
                        }
                    }
                }
                renderSeriesManager();
                renderTables();
                renderChart();
                resetDanmaku();
                updateWaterfallSelect();
                saveState();
            });
        }

        setTimeout(() => { resetDanmaku(); }, 500);
        init();
    </script>
</body>
